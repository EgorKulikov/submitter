name: Daily Integration Tests

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tests
        run: cargo test --test integration --no-run

      - name: Test UOJ
        env:
          UOJ_USER: ${{ secrets.UOJ_USER }}
          UOJ_PASS: ${{ secrets.UOJ_PASS }}
        run: cargo test --test integration test_uoj -- --nocapture

      - name: Test CodeChef
        env:
          CODECHEF_USER: ${{ secrets.CODECHEF_USER }}
          CODECHEF_PASS: ${{ secrets.CODECHEF_PASS }}
        run: cargo test --test integration test_codechef -- --nocapture

      - name: Test Kattis
        env:
          KATTIS_USER: ${{ secrets.KATTIS_USER }}
          KATTIS_TOKEN: ${{ secrets.KATTIS_TOKEN }}
        run: cargo test --test integration test_kattis -- --nocapture

      - name: Test Toph
        env:
          TOPH_USER: ${{ secrets.TOPH_USER }}
          TOPH_PASS: ${{ secrets.TOPH_PASS }}
        run: cargo test --test integration test_toph -- --nocapture

      - name: Test Yandex
        env:
          YANDEX_REFRESH_TOKEN: ${{ secrets.YANDEX_REFRESH_TOKEN }}
        run: cargo test --test integration test_yandex -- --nocapture

      - name: Test Eolymp
        env:
          EOLYMP_API_KEY: ${{ secrets.EOLYMP_API_KEY }}
        run: cargo test --test integration test_eolymp -- --nocapture
